    -I tests/gates/gate_modbus_minimal_protocol
    -I tests/gates/gate_modbus_robustness_layer
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_RAK3312

; --- RAK3312 Gate 5: LoRaWAN Join + Uplink Validation ---
[env:rak3312_gate5]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbmodem211401
monitor_port = /dev/cu.usbmodem211401
lib_deps =
    beegee-tokyo/SX126x-Arduino@^2.0.32
build_src_filter =
    +<*>
    +<../tests/gates/gate_modbus_minimal_protocol/>
    +<../tests/gates/gate_lorawan_join_uplink/>
build_flags =
    -I firmware/config
    -I tests/gates/gate_modbus_minimal_protocol

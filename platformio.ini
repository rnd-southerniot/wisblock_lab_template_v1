; =============================================================
; WisBlock Multi-Core Lab Template — PlatformIO Configuration
; =============================================================

; --- RAK4631 (nRF52840) - Default WisBlock Core ---
[env:rak4631]
platform = nordicnrf52
board = wiscore_rak4631
framework = arduino
monitor_speed = 115200

; --- RAK3312 Gate 1: I2C LIS3DH Validation ---
[env:rak3312]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbmodem211401
monitor_port = /dev/cu.usbmodem211401
build_src_filter =
    +<*>
    +<../tests/gates/gate_i2c_lis3dh_validation/>
build_flags =
    -I firmware/config
    -I tests/gates/gate_i2c_lis3dh_validation
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

; --- RAK3312 Gate 2: RS485 Modbus Autodiscovery Validation ---
[env:rak3312_gate2]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbmodem211401
monitor_port = /dev/cu.usbmodem211401
build_src_filter =
    +<*>
    +<../tests/gates/gate_rs485_autodiscovery_validation/>
build_flags =
    -I firmware/config
    -I tests/gates/gate_rs485_autodiscovery_validation
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

; --- RAK3312 Gate 3: Modbus Minimal Protocol Validation ---
[env:rak3312_gate3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbmodem211401
monitor_port = /dev/cu.usbmodem211401
build_src_filter =
    +<*>
    +<../tests/gates/gate_modbus_minimal_protocol/>
build_flags =
    -I firmware/config
    -I tests/gates/gate_modbus_minimal_protocol
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_RAK3312

; --- RAK3312 Gate 4: Modbus Robustness Layer Validation ---
[env:rak3312_gate4]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbmodem211401
monitor_port = /dev/cu.usbmodem211401
build_src_filter =

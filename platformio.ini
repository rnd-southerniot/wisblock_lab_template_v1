    -I firmware/runtime
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_RAK3312

; --- RAK4631 Gate 10: Secure Downlink Protocol v2 Validation ---
[env:rak4631_gate10]
platform = nordicnrf52
board = wiscore_rak4631
framework = arduino
monitor_speed = 115200
lib_deps =
    beegee-tokyo/SX126x-Arduino@^2.0.32
build_src_filter =
    +<../tests/gates/gate_secure_downlink_v2/main.cpp>
    +<../tests/gates/gate_modbus_minimal_protocol/>
    +<../firmware/runtime/>
    +<../tests/gates/gate_secure_downlink_v2/gate_runner.cpp>
    +<../tests/gates/gate_secure_downlink_v2/storage_hal.cpp>
build_flags =
    -I firmware/config
    -I tests/gates/gate_secure_downlink_v2
    -I tests/gates/gate_modbus_minimal_protocol
    -I firmware/runtime
    -DCORE_RAK4631

; --- RAK3312 Gate 10: Secure Downlink Protocol v2 Validation ---
[env:rak3312_gate10]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbmodem21201
monitor_port = /dev/cu.usbmodem21201
upload_protocol = esptool
upload_flags =
    --before=usb_reset
lib_deps =
    beegee-tokyo/SX126x-Arduino@^2.0.32
build_src_filter =
    +<../tests/gates/gate_secure_downlink_v2/main.cpp>
    +<../tests/gates/gate_modbus_minimal_protocol/>
    +<../firmware/runtime/>
    +<../tests/gates/gate_secure_downlink_v2/gate_runner.cpp>
    +<../tests/gates/gate_secure_downlink_v2/storage_hal.cpp>
build_flags =
    -I firmware/config
    -I tests/gates/gate_secure_downlink_v2
    -I tests/gates/gate_modbus_minimal_protocol
    -I firmware/runtime
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_RAK3312

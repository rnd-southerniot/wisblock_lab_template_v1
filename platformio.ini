; =============================================================
; WisBlock Multi-Core Lab Template — PlatformIO Configuration
; =============================================================

; --- RAK4631 Gate 0: Toolchain Validation ---
[env:rak4631_gate0]
platform = nordicnrf52
board = wiscore_rak4631
framework = arduino
monitor_speed = 115200
board_build.variants_dir = variants
board_build.variant = WisCore_RAK4631_Board
lib_deps =
    Adafruit TinyUSB Library=symlink:///Users/robotics/.platformio/packages/framework-arduinoadafruitnrf52/libraries/Adafruit_TinyUSB_Arduino
build_src_filter =
    +<main.cpp>
    +<../tests/gates/gate_rak4631_toolchain/>
build_flags =
    -DCORE_RAK4631


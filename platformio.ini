; =============================================================
; WisBlock Multi-Core Lab Template — PlatformIO Configuration
; =============================================================

; --- RAK4631 (nRF52840) - Default WisBlock Core ---
[env:rak4631]
platform = nordicnrf52
board = wiscore_rak4631
framework = arduino
monitor_speed = 115200

; --- RAK3312 (ESP32-S3 + SX1262) - WisBlock Core for Gate Testing ---
[env:rak3312]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbmodem211401
monitor_port = /dev/cu.usbmodem211401
build_src_filter =
    +<*>
    +<../tests/gates/gate_i2c_lis3dh_validation/>
build_flags =
    -I firmware/config
    -I tests/gates/gate_i2c_lis3dh_validation
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
